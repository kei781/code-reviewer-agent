name: Claude PR Review

# PR이 열리거나 새 커밋이 push될 때 멘션 없이 자동으로 Claude가 코드리뷰한다.
# 발견 사항은 해당 diff "라인"에 인라인 코멘트로 달고, 총평만 별도 요약 코멘트로 남긴다.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 인라인(라인별) 리뷰 코멘트 + gh CLI + 빌드/테스트 검증 도구 허용
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(npm ci),Bash(npm run check)"
          prompt: |
            이 저장소(kei781/code-reviewer-agent)의 이 PR을 한국어로 코드리뷰하라.
            먼저 루트의 ADR.md / PRD.md / AGENTS.md 를 읽고 그 정책 기준으로 검토한다.

            중점 점검 항목:
            - SQL safety gate 우회 / catalog allowlist 위반 / 임의 테이블·컬럼 접근 가능성
            - LIMIT 기본값·상한 처리, LLM output이 검증 없이 DB query로 전달되는 경로
            - Reviewer(R) / Fixer(F) 역할 분리 위반, 숨은 실행 컨텍스트·self-review 공유
            - auto-merge / write-token 루프 / fork-PR secret 접근 / branch-protection 우회처럼
              해당 phase에서 명시적으로 허용되지 않은 동작의 도입 여부
            - 의존성 방향 위반: src/domain 이 app·adapters·SDK·process.env·네트워크·셸에 의존하는지
            - 테스트 커버리지: 규칙·정책·상태전이·파싱 로직에 대한 테스트 유무.
              필요하면 `npm ci && npm run check`를 직접 실행해 테스트 러너가 실제로
              테스트를 실행하는지(no-op 여부)까지 검증하라.

            출력 방식 (중요):
            - 구체적 문제는 반드시 `mcp__github_inline_comment__create_inline_comment`(confirmed: true)로
              해당 파일의 "정확한 라인"에 인라인 코멘트를 단다. 한 코멘트 = 한 이슈.
            - 각 인라인 코멘트는 맨 앞에 심각도 태그로 시작한다: [P0]/[P1]/[P2]
              (P0=머지 차단, P1=중요, P2=권장). 가능하면 구체적 수정안이나 제안 diff를 포함한다.
            - 전반 평가/요약은 `gh pr comment`로 PR에 "딱 하나"만 남긴다.
            - 리뷰 내용을 일반 메시지로 출력하지 말고, 반드시 GitHub 코멘트로만 게시하라.
            - 단순 칭찬은 줄이고 실질 문제에 집중하라.
